name: Bug report
description: Something in the framework misbehaves, crashes, or returns the wrong result.
title: "[Bug] "
labels: ["bug", "priority: medium"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report.  The more concrete the
        reproduction, the faster a fix can land — please attach a
        minimal code snippet whenever possible.

        Before submitting, a quick sanity check:
        - Are you on the latest `actor-ts` version?
        - Does the issue reproduce against an in-memory transport /
          journal (rules out a peer-dep mismatch)?

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: One paragraph — the symptom you observed.
      placeholder: "When I tell the SqliteJournal-backed PersistentActor a `crash` command, ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect
      description: One sentence — the behaviour you thought you'd get.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        Minimal code that triggers the bug.  TypeScript snippet, a
        failing test case, or a link to a reproducer repo — whatever
        makes the bug reproducible in under 5 minutes.
      render: typescript
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: actor-ts version
      placeholder: "0.7.0 (or commit SHA if running off main)"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Bun
        - Node.js
        - Deno
        - Multiple / mixed
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: "Bun 1.3.1 / Node 22.4 / Deno 2.1"
    validations:
      required: true

  - type: checkboxes
    id: peer-deps
    attributes:
      label: Optional peer dependencies in use
      description: |
        Only check the ones your code actually exercises — the bug may
        be in our adapter for that integration.
      options:
        - label: SQLite (`better-sqlite3` on Node)
        - label: Cassandra / ScyllaDB (`cassandra-driver`)
        - label: Redis cache (`ioredis`)
        - label: Memcached cache (`memjs`)
        - label: S3 / MinIO object storage (`@aws-sdk/client-s3`)
        - label: Kafka (`kafkajs`)
        - label: NATS / JetStream (`nats`)
        - label: MQTT (`mqtt`)
        - label: AMQP / RabbitMQ (`amqplib`)
        - label: gRPC (`@grpc/grpc-js`)
        - label: WebSocket (`ws`)
        - label: HTTP — Fastify / Express / Hono
        - label: Kubernetes lease / discovery (`@kubernetes/client-node`)

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Anything notable from stderr / the actor system's debug log.
      render: shell
