name: build

# Verifies `bun run build` produces a usable `dist/` (entry point +
# type declarations).  Only needs to run when something in the
# build inputs changes — source, tsconfig, dependency manifest, or
# the workflow itself.  Skips on docs-only / test-only / README
# changes so the actions queue stays focused.

on:
  push:
    branches: [develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build (tsc → dist/)
        run: bun run build

      - name: Verify dist/ produced
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          echo "dist/ artifacts present"
