name: publish

# Fires when a GitHub Release is published (e.g. via
# `gh release create vX.Y.Z --latest`).  Pre-release-flagged
# releases also trigger — gate on tag-shape if pre-releases
# shouldn't ship to @latest on npm.
#
# Auth model: **npm Trusted Publishing** via GitHub's OIDC.
# Registered on npmjs.com → Settings → Trusted Publishers for
# the `actor-ts` package, pinned to this repo + this workflow.
# No long-lived NPM_TOKEN secret is involved — the workflow
# exchanges its short-lived OIDC token for a one-shot npm
# publish token at runtime.  Requires npm >= 11.5.1.
on:
  release:
    types: [published]
  # Manual fallback: a release-event run uses the workflow file at the tag's
  # commit, so a workflow bug can't be fixed-and-re-run through the release
  # event alone.  Dispatching from a fixed branch re-attempts the publish;
  # the version guard below makes re-runs safe.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # Required for both npm provenance AND OIDC trusted publishing.

    # Quarantine the worker-thread multi-node suites (ParallelMultiNodeSpec +
    # LeaseMajority e2e) on GitHub's hosted runners, exactly as test.yml does —
    # Bun there can't respawn worker threads after the first test.  Set at JOB
    # level so the `bun test` inside `npm publish`'s `prepublishOnly` inherits
    # it.  Those suites run locally + in Docker; the `integration` workflow is
    # the real multi-node gate.
    env:
      ACTOR_TS_SKIP_FLAKY_MNS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install deps in a Bun-only environment (no Node on PATH).  This matches
      # the green `test.yml`: better-sqlite3's postinstall resolves a prebuilt
      # binary for Bun's Node ABI instead of falling back to a `node-gyp`
      # source build (which breaks on the runner's Node 20 via a
      # node-gyp/undici incompatibility).  Node + npm are set up afterwards,
      # only for the publish step.
      #
      # Typecheck / test / build are deliberately NOT separate steps: `npm
      # publish` runs `prepublishOnly` (`clean && build && typecheck && test`)
      # on this same Bun toolchain immediately before it publishes, so adding
      # explicit steps here would run the whole suite twice.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node + npm registry
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Pinned to the npm 11 major: npm@latest is npm 12+, which requires
      # Node >= 22 and EBADENGINEs on this runner's Node 20.  npm 11 supports
      # Node 20 and trusted publishing alike.
      - name: Upgrade npm to a version that supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@11

      - name: Skip if this version already exists on npm
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "actor-ts@$VERSION" version > /dev/null 2>&1; then
            echo "actor-ts@$VERSION already published — skipping publish step."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "actor-ts@$VERSION not on npm yet — will publish."
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.already_published == 'false'
        # Tokenless — npm Trusted Publishing via GitHub OIDC.  With
        # `id-token: write` + a Trusted Publisher configured on npmjs.com
        # (repo pathosDev/actor-ts, workflow publish.yml, no environment),
        # npm ≥ 11.5.1 auto-detects the OIDC path — no NODE_AUTH_TOKEN.
        # `--provenance` signs via the same id-token.
        run: npm publish --provenance --access public
