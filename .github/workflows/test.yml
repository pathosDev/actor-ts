name: tests

# Runs the unit / multi-node / smoke suite + the README-badge
# updater.  Triggers on any change that could plausibly affect a
# test result: source code, ANY test subtree (unit, multi-node,
# smoke, AND integration — tests that share helpers in
# `tests/integration/` could shift unit-test imports), dependency
# manifest, tsconfig.  Docs-only / README-only / ROADMAP / CHANGELOG
# changes deliberately skip — they can't change test outcomes.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'tsconfig.dev.json'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'tsconfig.dev.json'
      - '.github/workflows/test.yml'
  workflow_dispatch:

# Serialise runs that share the same ref — without this, two main-
# push runs that both reach the "Commit + push README" step race on
# `git push`: the second fetches a base that's already moved and
# fails with `non-fast-forward`.  Grouping by `github.ref`:
#   - Main pushes (`refs/heads/main`) queue behind each other →
#     README updates land in order, no force-push gymnastics.
#   - PRs (`refs/pull/N/merge`) get their own group per PR →
#     different PRs don't block each other.
#   - Re-pushes to the same PR cancel the in-flight run → no
#     wasted CI on stale commits.
# `cancel-in-progress` evaluated per event type: cancel for PRs
# (drop stale work), queue for main pushes (preserve every commit's
# README state).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    # Single job — typecheck, run the suite once with `--coverage`,
    # parse the resulting stats, and (on `main` push only) flip the
    # README badge.  Previously the suite ran twice (a `test` job
    # without coverage, then `update-readme` with coverage), which
    # gave the parser a different bun output to read than the one the
    # actual build status came from — a flaky timing-sensitive test
    # under coverage instrumentation could push the badge to "1489
    # of 1490" while the build itself stayed green.  One run, one
    # source of truth.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Tests with coverage
        id: stats
        # The worker-thread multi-node suites (ParallelMultiNodeSpec +
        # parallel-pubsub) and the in-process LeaseMajority e2e are
        # quarantined on GitHub's hosted runners — Bun there can't respawn
        # functional worker threads after the first test, which also
        # starves the lease arbitration into a false split-brain.  They
        # run locally + in Docker; the real-network `integration` workflow
        # is the multi-node CI gate.  See the [CI] tracking issue.
        env:
          ACTOR_TS_SKIP_FLAKY_MNS: '1'
        run: |
          # Capture full output without letting a non-zero exit kill
          # the step — we always want the parsed numbers in
          # `steps.stats.outputs` so the README still updates with a
          # red badge when the suite breaks.  The original exit
          # status is replayed at the end so the job's final result
          # is still red on failure.
          set +e
          OUTPUT=$(bun test --coverage 2>&1)
          STATUS=$?
          set -e

          # Replay bun's output so the GitHub Actions UI still shows
          # per-test results just like a regular `bun test` step.
          echo "$OUTPUT"
          echo
          echo "----- bun output tail (parser input) -----"
          echo "$OUTPUT" | tail -20
          echo "------------------------------------------"

          # Parse the FINAL summary block.  bun emits exactly one such
          # block at the very end:
          #    N pass
          #    M skip
          #    K fail
          #    Q expect() calls
          #  Ran X tests across Y files. [Zs]
          # `$` end-anchor rejects per-test lines like "(pass) name [Xms]"
          # and other noise; `tail -1` guards against any intermediate
          # match if bun's format ever grows per-file summaries.
          # Skips stay separate — `total = pass + fail` represents
          # actually-executed tests, so "1490 of 1490" means "all 1490
          # active tests passed" (skipped tests counted separately).
          PASS=$(echo "$OUTPUT" | grep -E "^[[:space:]]+[0-9]+ pass$" | grep -oE "[0-9]+" | tail -1)
          FAIL=$(echo "$OUTPUT" | grep -E "^[[:space:]]+[0-9]+ fail$" | grep -oE "[0-9]+" | tail -1)
          [[ -z "$FAIL" ]] && FAIL=0
          [[ -z "$PASS" ]] && PASS=0
          TOTAL=$((PASS + FAIL))
          # Line coverage from the "All files" aggregate row, second column.
          LINES=$(echo "$OUTPUT" | grep "^All files" | awk -F'|' '{print $2}' | tr -d ' ')
          LINES_INT=${LINES%.*}
          [[ -z "$LINES_INT" ]] && LINES_INT=0

          echo "pass=$PASS"     >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"   >> "$GITHUB_OUTPUT"
          echo "lines=$LINES_INT" >> "$GITHUB_OUTPUT"
          echo "Parsed: $PASS of $TOTAL tests passing, $LINES_INT% line coverage"

          # Propagate the original bun exit status — non-zero turns
          # the job red, but the step outputs above are already
          # written so the README job downstream still has data.
          exit $STATUS

      - name: Coverage-floor gate (≥ 80%)
        # Runs only after the test step succeeded.  Re-parses the
        # already-captured line coverage and fails the workflow if
        # it dropped below the floor.  Same parser as the step above,
        # so the two see the same numbers — pin via a single source
        # of truth (the badge update sees what the gate enforces).
        #
        # Floor configured via the COVERAGE_LINE_FLOOR env var — set
        # at the workflow level so future tightening (90 → 92 → 95)
        # is a one-line PR rather than a script-edit.  Local devs run
        # `bun run test:coverage:gate` to get the same check.
        if: success() && steps.stats.outputs.lines != ''
        env:
          # 80 — pragmatic floor.  The worker-thread multi-node suites are
          # quarantined on GitHub's hosted runners (Bun can't respawn
          # functional workers after the first test — see the coverage step
          # + #325), which removes coverage of the worker-thread machinery
          # and drops hosted-CI line coverage to ~86%.  Rather than gate
          # tightly against code that physically can't execute on the
          # hosted runner, we use a pragmatic 80% floor; product code
          # (cluster, persistence, LeaseMajority @100%, …) stays well above
          # it.  Raise this if the worker-thread suites ever run on CI again.
          COVERAGE_LINE_FLOOR: '80'
          PARSED_LINES: ${{ steps.stats.outputs.lines }}
        run: |
          if [[ -z "$PARSED_LINES" ]]; then
            echo "coverage-gate: stats.outputs.lines was empty — parser regression?  Fail loud."
            exit 1
          fi
          if (( PARSED_LINES < COVERAGE_LINE_FLOOR )); then
            echo "::error::coverage-gate: line coverage ${PARSED_LINES}% < floor ${COVERAGE_LINE_FLOOR}%"
            echo "Add tests for under-covered files (see the per-file table in the previous step) and rerun."
            exit 1
          fi
          echo "coverage-gate: PASS (${PARSED_LINES}% ≥ ${COVERAGE_LINE_FLOOR}%)"

      - name: Update README badges + inline references
        # Always run, including after a failing test step — that's
        # exactly when the badge needs to flip to red.  PRs and
        # non-main branches skip via the event/ref check (forks have
        # no push rights anyway).
        if: |
          !cancelled() &&
          steps.stats.outputs.pass != '' &&
          steps.stats.outputs.lines != '' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        run: |
          PASS="${{ steps.stats.outputs.pass }}"
          TOTAL="${{ steps.stats.outputs.total }}"
          LINES="${{ steps.stats.outputs.lines }}"
          # Pick badge color from pass/total ratio:
          #   pass == total → green   (22c55e)  — all green
          #   pass <  total → red     (ef4444)  — at least one fail
          # Coverage badge follows the same green by default; thresholds
          # could be added later (e.g. <70% → red, <85% → yellow).
          if [[ "$PASS" -eq "$TOTAL" ]]; then
            TEST_COLOR="22c55e"
            STATUS_LABEL="green"
          else
            TEST_COLOR="ef4444"
            STATUS_LABEL="red"
          fi
          COV_COLOR="22c55e"
          echo "Computed badge state:"
          echo "  tests-${PASS}/${TOTAL} (${STATUS_LABEL})"
          echo "  coverage-~${LINES}%"

          # 1. Static badge URLs (img.shields.io) — pattern matches the
          #    full 'tests-X%20of%20Y-COLOR' segment so the colour gets
          #    rewritten when the ratio shifts.
          sed -i -E "s|tests-[0-9]+%20of%20[0-9]+-[0-9a-fA-F]{6}|tests-${PASS}%20of%20${TOTAL}-${TEST_COLOR}|g" README.md
          sed -i -E "s|coverage-~[0-9]+%25-[0-9a-fA-F]{6}|coverage-~${LINES}%25-${COV_COLOR}|g" README.md
          # 2. Inline prose references.  Test-count regex demands 3+ digits
          #    so '~9 tests' (env-gated subset elsewhere) is not matched.
          sed -i -E "s|~[0-9]{3,}( tests)|~${PASS}\1|g" README.md
          sed -i -E "s|~[0-9]+( % line)|~${LINES}\1|g" README.md

          # Make the result of the substitutions explicit in the log.
          # Previously the only signal that this step had done anything
          # was a downstream "no badge changes" line — opaque when the
          # README already happened to match the freshly-computed
          # numbers (e.g. an unchanged-flake commit re-running on the
          # same red badge state).  Now the diff is visible inline.
          if git diff --quiet README.md; then
            echo "README already reflects ${PASS}/${TOTAL} ${STATUS_LABEL} — no edits needed"
          else
            echo "README diff after substitution:"
            git --no-pager diff -U0 README.md
          fi

      - name: Commit + push README if changed
        if: |
          !cancelled() &&
          steps.stats.outputs.pass != '' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore(readme): update test count + coverage stats [skip ci]"
            git push
            echo "pushed README update"
          else
            echo "README unchanged — nothing to commit (the previous run already pushed these numbers)"
          fi
