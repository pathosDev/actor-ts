# Build + deploy the Astro Starlight documentation site under `docs/`
# to GitHub Pages.
#
# Strategy: every push to `main` builds the site and deploys it to
# Pages.  PRs build only — they run as a status-check so a broken
# config gets caught before it lands on main.  Build output is never
# committed; Pages consumes the workflow artifact directly via the
# `actions/deploy-pages` action.
#
# **Prerequisite — manual one-time setup**:
#   Settings → Pages → Source: GitHub Actions
# (Without that, the deploy step fails with "Pages site not found".)
#
# **Permissions**: the deploy job needs `pages: write` + `id-token:
# write` to publish the artifact via OIDC.  Workflow-level defaults
# leave other scopes read-only.
name: docs

on:
  push:
    branches: [main]
    paths:
      # Run on changes to the docs site itself, AND on changes to
      # `src/` (because TypeDoc regenerates the API reference from
      # JSDoc on every build).
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
      # Also run when the README changes — it gets pulled into the
      # landing page indirectly via Starlight's edit-link.
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
      - 'README.md'
  # Allow manual triggering from the Actions tab for emergency rebuilds.
  workflow_dispatch:

# Avoid in-flight workflow conflicts: cancel any older run on the same
# branch if a new push lands.  Pages itself only accepts one deploy
# at a time anyway.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Starlight's `lastUpdated` feature reads Git history to show
          # the per-page last-modified date.  Full history (`0`) lets
          # it work; shallow checkout makes every page report "now".
          fetch-depth: 0

      # Astro 6 requires Node >= 22.12.  `bun install` is fast and reads
      # `docs/bun.lock`, but `bun run build` ultimately invokes
      # `astro build` whose shebang spawns Node — so the system Node has
      # to satisfy Astro's minimum.  GitHub-hosted runners default to
      # Node 20.x; we override here.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docs dependencies
        working-directory: docs
        run: bun install

      - name: Build site (includes TypeDoc API generation)
        working-directory: docs
        run: bun run build

      - name: Upload Pages artifact
        # Only upload on push-to-main events.  PR builds verify config
        # is valid but skip the artifact upload (Pages can't preview
        # multiple artifacts anyway).
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Don't deploy on PRs — the build job above already verified the
    # config compiles, and we don't want PR-builds to overwrite the
    # production Pages site.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
