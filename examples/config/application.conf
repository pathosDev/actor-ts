# Example application.conf that an operator might ship with a deployment.
# HOCON is a superset of JSON, so pure JSON works too.

actor-ts {
  system.name = "order-service"

  logger.level = "info"

  cluster {
    # Override just the fields we care about; the rest comes from reference.conf.
    gossip-interval = 500ms
    seed-retry-interval = 2s

    # Pulled from Kubernetes Downward-API or the environment at deploy time.
    # If the variable is missing, the fallback (inside the ?) is used.
    seeds = [
      ${?SEED_HOST_1}":"${?SEED_PORT}
      ${?SEED_HOST_2}":"${?SEED_PORT}
    ]
  }

  sharding {
    number-of-shards = 128
    remember-entities = true
    passivation-idle = 2 minutes
  }

  remote {
    tcp.hostname = ${?POD_IP}
    tcp.port = 2552
    max-frame-size = 4 MiB
  }

  http {
    backend = "fastify"
    shutdown-grace-period = 10s
  }
}
