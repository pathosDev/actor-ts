<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>actor-ts chat — Lit</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: color-mix(in srgb, currentColor 15%, transparent);
        --soft:   color-mix(in srgb, currentColor 5%, transparent);
        --accent: #4f8cff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; line-height: 1.4; }
    </style>
  </head>
  <body>
    <chat-app></chat-app>

    <!--
      No build step.  Lit is loaded as ES modules from a CDN.  For a
      production deployment you'd typically `vite build` to produce a
      bundle — see `frontend-lit/README.md`.
    -->
    <script type="module">
      import { LitElement, html, css } from 'https://esm.sh/lit@3';

      const WS_PATH = '/ws';
      const TOKEN_KEY = 'chat-token';
      const MAX_RECONNECT_ATTEMPTS = 8;

      class ChatApp extends LitElement {
        static properties = {
          phase: { state: true },           // 'login' | 'chat'
          username: { state: true },
          rooms: { state: true },
          currentRoom: { state: true },
          messagesByRoom: { state: true },
          usersByRoom: { state: true },
          unreadByRoom: { state: true },
          loginError: { state: true },
        };

        constructor() {
          super();
          // Synchronous initial-phase decision: if there's a token to
          // resume, start in 'resuming' (renders nothing).  Otherwise
          // 'login'.  Avoids the brief flash of the login form on
          // reload of an authenticated tab.
          const stored = typeof sessionStorage !== 'undefined'
            && sessionStorage.getItem(TOKEN_KEY);
          this.phase = stored ? 'resuming' : 'login';
          this.username = null;
          this.rooms = [];
          this.currentRoom = null;
          this.messagesByRoom = {};
          this.usersByRoom = {};
          this.unreadByRoom = {};
          this.loginError = '';
          this.ws = null;
          this.reconnectAttempts = 0;
          this.reconnectTimer = null;
        }

        static styles = css`
          .login {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 1rem;
          }
          .login form { display: flex; flex-direction: column; gap: 0.5rem; width: 280px; margin-top: 1rem; }
          input, button {
            padding: 0.5rem 0.75rem; font: inherit; border-radius: 4px; border: 1px solid var(--border);
          }
          button[type='submit'] {
            background: var(--accent); color: white; border-color: var(--accent); cursor: pointer;
          }
          .err { color: crimson; min-height: 1.2em; font-size: 0.9rem; }
          .creds { margin-top: 1.5rem; font-size: 0.85rem; background: var(--soft);
            padding: 0.5rem 0.75rem; border-radius: 4px; max-width: 320px; }
          code { background: var(--border); padding: 0 0.25rem; border-radius: 3px; }

          .chat { height: 100vh; display: flex; flex-direction: column; }
          header.bar { display: flex; justify-content: space-between; align-items: center;
            padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); }
          header.bar button { background: transparent; border: 1px solid var(--border); cursor: pointer; }
          .layout { flex: 1; display: grid; grid-template-columns: 220px 1fr 220px; min-height: 0; }
          aside { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
          aside:last-child { border-right: none; border-left: 1px solid var(--border); }
          aside h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
            color: #888; margin: 0; padding: 0.75rem 1rem; }
          ul.rooms, ul.users { list-style: none; margin: 0; padding: 0 0 0.5rem 0; overflow-y: auto; flex: 1; }
          ul.rooms li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.4rem 1rem; cursor: pointer; border-left: 3px solid transparent;
          }
          ul.rooms li.active { background: var(--soft); border-left-color: var(--accent); font-weight: 600; }
          ul.rooms li .badge { background: var(--accent); color: white; font-size: 0.7rem;
            padding: 0.05rem 0.4rem; border-radius: 999px; }
          ul.users li { padding: 0.4rem 1rem; }
          main { display: flex; flex-direction: column; min-height: 0; }
          .messages { flex: 1; overflow-y: auto; padding: 0.75rem 1rem; }
          .msg { margin-bottom: 0.4rem; }
          .from { font-weight: 600; margin-right: 0.4rem; }
          .ts { color: #888; font-size: 0.75rem; margin-left: 0.5rem; }
          form.compose { display: flex; gap: 0.5rem; padding: 0.5rem 1rem; border-top: 1px solid var(--border); }
          form.compose input { flex: 1; }
          form.compose button { background: var(--accent); color: white; border-color: var(--accent); }
        `;

        wsUrl() {
          const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          return `${proto}//${location.host}${WS_PATH}`;
        }

        connectWithLogin(username, password) {
          this.connect((ws) => ws.send(JSON.stringify({ type: 'login', username, password })));
        }

        connectWithResume(token) {
          this.connect((ws) => ws.send(JSON.stringify({ type: 'resume', token })));
        }

        connect(onOpen) {
          const ws = new WebSocket(this.wsUrl());
          this.ws = ws;
          ws.addEventListener('open', () => onOpen(ws));
          ws.addEventListener('message', (ev) => {
            const m = JSON.parse(ev.data);
            this.handleServer(m);
          });
          ws.addEventListener('close', () => {
            this.ws = null;
            // Try to resume with the stored token before falling
            // back to the login screen.  Covers singleton-failover
            // (phase 'chat') and reload-resume failure (phase
            // 'resuming') alike.
            if (!this.scheduleResumeReconnect() && this.phase !== 'login') {
              this.resetToLogin();
            }
          });
          ws.addEventListener('error', () => {
            if (this.phase === 'login' && !sessionStorage.getItem(TOKEN_KEY)) {
              this.loginError = 'Connection failed.';
            }
          });
        }

        scheduleResumeReconnect() {
          const token = sessionStorage.getItem(TOKEN_KEY);
          if (!token) return false;
          if (this.reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) return false;
          const delay = Math.min(500 * Math.pow(2, this.reconnectAttempts), 4000);
          this.reconnectAttempts++;
          this.reconnectTimer = setTimeout(() => {
            this.reconnectTimer = null;
            this.connectWithResume(token);
          }, delay);
          return true;
        }

        cancelReconnect() {
          if (this.reconnectTimer) {
            clearTimeout(this.reconnectTimer);
            this.reconnectTimer = null;
          }
          this.reconnectAttempts = 0;
        }

        handleServer(m) {
          switch (m.type) {
            case 'logged-in':
              this.cancelReconnect();
              this.username = m.username;
              if (m.token) sessionStorage.setItem(TOKEN_KEY, m.token);
              this.loginError = '';
              this.phase = 'chat';
              break;
            case 'login-failed':
              this.cancelReconnect();
              sessionStorage.removeItem(TOKEN_KEY);
              try { this.ws?.close(); } catch { }
              this.ws = null;
              // Drop back to the login form whether we were in
              // 'chat' (token revoked mid-session) or 'resuming'
              // (token rejected during reload-resume).
              if (this.phase !== 'login') this.resetToLogin();
              this.loginError = m.reason || 'Login failed';
              break;
            case 'rooms': {
              this.rooms = m.rooms.slice();
              const mb = { ...this.messagesByRoom };
              const ub = { ...this.usersByRoom };
              const ur = { ...this.unreadByRoom };
              for (const r of m.rooms) {
                mb[r] ??= [];
                ub[r] ??= [];
                ur[r] ??= 0;
              }
              this.messagesByRoom = mb;
              this.usersByRoom = ub;
              this.unreadByRoom = ur;
              if (!this.currentRoom) this.currentRoom = m.rooms[0] ?? null;
              break;
            }
            case 'history':
              this.messagesByRoom = { ...this.messagesByRoom, [m.room]: m.messages.slice() };
              break;
            case 'message': {
              const list = (this.messagesByRoom[m.room] ?? []).slice();
              list.push({ from: m.from, text: m.text, ts: m.ts });
              this.messagesByRoom = { ...this.messagesByRoom, [m.room]: list };
              if (m.room !== this.currentRoom) {
                this.unreadByRoom = {
                  ...this.unreadByRoom,
                  [m.room]: (this.unreadByRoom[m.room] ?? 0) + 1,
                };
              }
              break;
            }
            case 'users':
              this.usersByRoom = { ...this.usersByRoom, [m.room]: m.users.slice().sort() };
              break;
          }
        }

        resetToLogin() {
          this.cancelReconnect();
          this.phase = 'login';
          this.username = null;
          this.rooms = [];
          this.currentRoom = null;
          this.messagesByRoom = {};
          this.usersByRoom = {};
          this.unreadByRoom = {};
          this.ws = null;
        }

        onLoginSubmit(e) {
          e.preventDefault();
          this.loginError = '';
          const fd = new FormData(e.target);
          const u = fd.get('username')?.trim();
          const p = fd.get('password');
          if (!u || !p) return;
          this.connectWithLogin(u, p);
        }

        onLogout() {
          this.cancelReconnect();
          if (this.ws && this.ws.readyState === WebSocket.OPEN) {
            try { this.ws.send(JSON.stringify({ type: 'logout' })); } catch { }
          }
          sessionStorage.removeItem(TOKEN_KEY);
          if (this.ws) { try { this.ws.close(1000, 'logout'); } catch { } }
          this.resetToLogin();
        }

        // Auto-resume on element-attach (page load).  Lit's
        // `connectedCallback` runs once the host element joins the
        // DOM — we use it to attempt a token-based resume before
        // the user even sees the login form.
        connectedCallback() {
          super.connectedCallback();
          const stored = sessionStorage.getItem(TOKEN_KEY);
          if (stored) this.connectWithResume(stored);
        }

        selectRoom(room) {
          if (this.currentRoom === room) return;
          this.currentRoom = room;
          this.unreadByRoom = { ...this.unreadByRoom, [room]: 0 };
          if (this.ws && this.ws.readyState === WebSocket.OPEN) {
            this.ws.send(JSON.stringify({ type: 'switch-active-room', room }));
          }
        }

        onCompose(e) {
          e.preventDefault();
          const input = e.target.querySelector('input');
          const text = input.value.trim();
          if (!text || !this.currentRoom || !this.ws) return;
          this.ws.send(JSON.stringify({ type: 'send', room: this.currentRoom, text }));
          input.value = '';
        }

        render() {
          if (this.phase === 'login') return this.renderLogin();
          if (this.phase === 'chat') return this.renderChat();
          // 'resuming' — render nothing until the WS handshake
          // resolves into 'chat' (logged-in arrived) or 'login'
          // (resume rejected, all retries exhausted).
          return html``;
        }

        renderLogin() {
          return html`
            <div class="login">
              <h1>actor-ts chat</h1>
              <p style="color:#888;margin:0">Lit frontend</p>
              <form @submit=${this.onLoginSubmit} autocomplete="off">
                <input name="username" placeholder="username" required />
                <input name="password" type="password" placeholder="password" required />
                <button type="submit">Log in</button>
                <div class="err">${this.loginError}</div>
              </form>
              <div class="creds">
                <strong>Test users</strong>:
                <code>alice</code>/<code>wonderland</code>,
                <code>bob</code>/<code>builder</code>,
                <code>charlie</code>/<code>chaplin</code>,
                <code>diana</code>/<code>prince</code>
              </div>
            </div>
          `;
        }

        renderChat() {
          const messages = this.currentRoom ? (this.messagesByRoom[this.currentRoom] ?? []) : [];
          const users = this.currentRoom ? (this.usersByRoom[this.currentRoom] ?? []) : [];
          return html`
            <div class="chat">
              <header class="bar">
                <div><strong>actor-ts chat</strong> — ${this.username}</div>
                <button @click=${this.onLogout}>Logout</button>
              </header>
              <div class="layout">
                <aside>
                  <h2>Rooms</h2>
                  <ul class="rooms">
                    ${this.rooms.map((r) => html`
                      <li class=${r === this.currentRoom ? 'active' : ''} @click=${() => this.selectRoom(r)}>
                        <span># ${r}</span>
                        ${(this.unreadByRoom[r] ?? 0) > 0
                          ? html`<span class="badge">${this.unreadByRoom[r]}</span>`
                          : ''}
                      </li>
                    `)}
                  </ul>
                </aside>
                <main>
                  <div class="messages">
                    ${messages.map((m) => html`
                      <div class="msg">
                        <span class="from">${m.from}:</span>${m.text}
                        <span class="ts">${new Date(m.ts).toLocaleTimeString()}</span>
                      </div>
                    `)}
                  </div>
                  <form class="compose" @submit=${this.onCompose}>
                    <input placeholder="Type a message..." autocomplete="off" />
                    <button type="submit">Send</button>
                  </form>
                </main>
                <aside>
                  <h2>Online (${users.length})</h2>
                  <ul class="users">
                    ${users.map((u) => html`
                      <li>${u}${u === this.username ? ' (you)' : ''}</li>
                    `)}
                  </ul>
                </aside>
              </div>
            </div>
          `;
        }
      }

      customElements.define('chat-app', ChatApp);
    </script>
  </body>
</html>
