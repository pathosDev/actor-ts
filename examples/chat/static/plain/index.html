<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>actor-ts chat — plain HTML</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: color-mix(in srgb, currentColor 15%, transparent);
        --soft:   color-mix(in srgb, currentColor 5%, transparent);
        --accent: #4f8cff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        line-height: 1.4;
      }

      /* ---------- login screen ---------- */
      #login {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      #login h1 { margin-bottom: 0.25rem; }
      #login .lead { color: #888; margin-top: 0; }
      form#login-form {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: 280px;
        margin-top: 1rem;
      }
      form#login-form input,
      form#login-form button {
        padding: 0.5rem 0.75rem;
        font: inherit;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      form#login-form button {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
        cursor: pointer;
      }
      #login-error {
        color: crimson;
        font-size: 0.9rem;
        min-height: 1.2em;
        margin-top: 0.5rem;
      }
      .creds {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        background: var(--soft);
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        max-width: 320px;
      }
      .creds code {
        background: var(--border);
        padding: 0 0.25rem;
        border-radius: 3px;
      }

      /* ---------- chat screen ---------- */
      #chat {
        display: none;
        height: 100vh;
        flex-direction: column;
      }
      #chat.active { display: flex; }
      header.bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 1rem;
        border-bottom: 1px solid var(--border);
      }
      header.bar .title { font-weight: 600; }
      header.bar button {
        font: inherit;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
      }
      .layout {
        flex: 1;
        display: grid;
        grid-template-columns: 220px 1fr 220px;
        min-height: 0;
      }
      .layout > aside,
      .layout > main {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      aside { border-right: 1px solid var(--border); }
      aside:last-child { border-right: none; border-left: 1px solid var(--border); }
      aside h2 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        margin: 0;
        padding: 0.75rem 1rem;
      }
      ul.list {
        list-style: none;
        margin: 0;
        padding: 0 0 0.5rem 0;
        overflow-y: auto;
        flex: 1;
      }
      ul.list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.4rem 1rem;
        cursor: pointer;
        border-left: 3px solid transparent;
      }
      ul.list li.active {
        background: var(--soft);
        border-left-color: var(--accent);
        font-weight: 600;
      }
      ul.list li .badge {
        background: var(--accent);
        color: white;
        font-size: 0.7rem;
        padding: 0.05rem 0.4rem;
        border-radius: 999px;
      }
      ul.list.users li {
        cursor: pointer;
        border-left: none;
      }
      ul.list.users li.self {
        cursor: default;
        color: #888;
      }
      /* DM rooms render the same as channels but with italics so the
         `@`-prefix is reinforced visually. */
      ul.list li.dm span:first-child { font-style: italic; }
      /* room-create row at the bottom of the Rooms aside. */
      form.room-create {
        display: flex;
        gap: 0.25rem;
        padding: 0.5rem 1rem;
        border-top: 1px solid var(--border);
      }
      form.room-create input {
        flex: 1;
        min-width: 0;
        font: inherit;
        padding: 0.25rem 0.4rem;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      form.room-create button {
        font: inherit;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
      form.room-create input.invalid {
        border-color: crimson;
      }

      main {
        position: relative;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem 1rem;
      }
      .messages .msg { margin-bottom: 0.4rem; }
      .messages .msg .from {
        font-weight: 600;
        margin-right: 0.4rem;
      }
      .messages .msg .ts {
        color: #888;
        font-size: 0.75rem;
        margin-left: 0.5rem;
      }
      .messages .msg.system {
        color: #888;
        font-style: italic;
      }
      form.compose {
        display: flex;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-top: 1px solid var(--border);
      }
      form.compose input {
        flex: 1;
        font: inherit;
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      form.compose button {
        font: inherit;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- ============== LOGIN ============== -->
    <!-- Hidden by default.  The <script> at the bottom reveals it
         only when there's no stored token to resume — avoids the
         "login form flashes for ~100 ms before resume completes"
         that we'd otherwise get on every reload. -->
    <section id="login" hidden>
      <h1>actor-ts chat</h1>
      <p class="lead">Plain HTML frontend</p>
      <form id="login-form" autocomplete="off">
        <input id="username" name="username" placeholder="username" required />
        <input id="password" name="password" type="password" placeholder="password" required />
        <button type="submit">Log in</button>
        <div id="login-error"></div>
      </form>
      <div class="creds">
        <strong>Test users</strong>:
        <code>alice</code>/<code>wonderland</code>,
        <code>bob</code>/<code>builder</code>,
        <code>charlie</code>/<code>chaplin</code>,
        <code>diana</code>/<code>prince</code>
      </div>
    </section>

    <!-- ============== CHAT ============== -->
    <section id="chat">
      <header class="bar">
        <div class="title">actor-ts chat — <span id="me"></span></div>
        <button id="logout">Logout</button>
      </header>
      <div class="layout">
        <aside>
          <h2>Rooms</h2>
          <ul id="rooms" class="list"></ul>
          <form id="room-create" class="room-create" autocomplete="off"
                title="Create a new room (a–z, 0–9, _-, 1–32 chars)">
            <input id="room-create-input" placeholder="+ new room"
                   maxlength="32" />
            <button type="submit">Add</button>
          </form>
        </aside>
        <main>
          <div id="messages" class="messages"></div>
          <form id="compose" class="compose">
            <input id="compose-text" placeholder="Type a message…" autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </main>
        <aside>
          <h2>Online (<span id="users-count">0</span>)</h2>
          <ul id="users" class="list users"></ul>
        </aside>
      </div>
    </section>

    <script>
      'use strict';

      /* ============== state ============== */
      const TOKEN_KEY = 'chat-token';
      const MAX_RECONNECT_ATTEMPTS = 8;
      /** Mirrors `isRoomName` in shared/rooms.ts on the server. */
      const ROOM_NAME_PATTERN = /^[A-Za-z0-9][A-Za-z0-9_-]{0,31}$/;
      const isDmRoom = (r) => typeof r === 'string' && r.startsWith('@');
      const dmRoomFor = (u) => `@${u}`;
      const state = {
        username: null,
        ws: null,
        rooms: [],
        currentRoom: null,
        messagesByRoom: new Map(),    // RoomName → ChatMessage[]
        usersByRoom:    new Map(),    // RoomName → string[]
        unreadByRoom:   new Map(),    // RoomName → number
      };
      /** Reconnect bookkeeping — see scheduleResumeReconnect. */
      let reconnectAttempts = 0;
      let reconnectTimer = null;

      /* ============== elements ============== */
      const $login    = document.getElementById('login');
      const $chat     = document.getElementById('chat');
      const $me       = document.getElementById('me');
      const $form     = document.getElementById('login-form');
      const $username = document.getElementById('username');
      const $password = document.getElementById('password');
      const $loginErr = document.getElementById('login-error');
      const $logout   = document.getElementById('logout');
      const $rooms    = document.getElementById('rooms');
      const $rcForm   = document.getElementById('room-create');
      const $rcInput  = document.getElementById('room-create-input');
      const $users    = document.getElementById('users');
      const $usersCnt = document.getElementById('users-count');
      const $msgs     = document.getElementById('messages');
      const $compose  = document.getElementById('compose');
      const $cText    = document.getElementById('compose-text');

      /* ============== login ============== */
      $form.addEventListener('submit', (e) => {
        e.preventDefault();
        $loginErr.textContent = '';
        const username = $username.value.trim();
        const password = $password.value;
        if (!username || !password) return;
        connectWithLogin(username, password);
      });
      $logout.addEventListener('click', () => {
        // Cancel any in-flight reconnect attempts first — wiping
        // the token below would have made them no-ops anyway, but
        // doing it here makes the intent explicit.
        cancelReconnect();
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          try { state.ws.send(JSON.stringify({ type: 'logout' })); } catch {}
        }
        sessionStorage.removeItem(TOKEN_KEY);
        if (state.ws) { try { state.ws.close(1000, 'logout'); } catch {} }
        resetToLogin();
      });

      /* ============== websocket ============== */
      function wsUrl() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${proto}//${location.host}/ws`;
      }

      // Two entry points — login (with credentials) and resume (with
      // a stored token).  Both end up doing the same thing once the
      // server replies with `logged-in`; only the first frame they
      // send differs.

      function connectWithLogin(username, password) {
        connect((ws) => ws.send(JSON.stringify({ type: 'login', username, password })));
      }

      function connectWithResume(token) {
        connect((ws) => ws.send(JSON.stringify({ type: 'resume', token })));
      }

      function connect(onOpen) {
        const ws = new WebSocket(wsUrl());
        state.ws = ws;
        ws.addEventListener('open', () => onOpen(ws));
        ws.addEventListener('message', (ev) => {
          let msg;
          try { msg = JSON.parse(ev.data); } catch { return; }
          handleServer(msg);
        });
        ws.addEventListener('close', () => {
          state.ws = null;
          // Don't go straight back to the login screen on socket
          // close — try to resume with the stored token first.
          // Covers the singleton-failover case where the ingress
          // node dies and the survivor takes a few seconds to
          // rebind :8080.  The chat view stays mounted (frozen
          // briefly) and reconnects under the hood.
          if (!scheduleResumeReconnect() && state.username) {
            resetToLogin();
            $loginErr.textContent = 'Connection closed.';
          }
        });
        ws.addEventListener('error', () => {
          if (!state.username && !sessionStorage.getItem(TOKEN_KEY)) {
            $loginErr.textContent = 'Connection failed.';
          }
        });
      }

      /**
       * Try to schedule a `resume`-based reconnect.  Returns true if
       * one was actually scheduled — caller falls back to the login
       * screen when this returns false (no token, or all attempts
       * exhausted).  Backoff is exponential, capped at 4 s, max
       * `MAX_RECONNECT_ATTEMPTS` per failover.
       */
      function scheduleResumeReconnect() {
        const token = sessionStorage.getItem(TOKEN_KEY);
        if (!token) return false;
        if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) return false;
        const delay = Math.min(500 * Math.pow(2, reconnectAttempts), 4000);
        reconnectAttempts++;
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connectWithResume(token);
        }, delay);
        return true;
      }

      function cancelReconnect() {
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        reconnectAttempts = 0;
      }

      /* ============== inbound dispatch ============== */
      function handleServer(msg) {
        switch (msg.type) {
          case 'logged-in':    return onLoggedIn(msg.username, msg.token);
          case 'login-failed': return onLoginFailed(msg.reason);
          case 'rooms':        return onRooms(msg.rooms);
          case 'room-added':   return onRoomAdded(msg.name);
          case 'room-removed': return onRoomRemoved(msg.name);
          case 'history':      return onHistory(msg.room, msg.messages);
          case 'message':      return onMessage(msg.room, { from: msg.from, text: msg.text, ts: msg.ts });
          case 'users':        return onUsers(msg.room, msg.users);
          case 'system':       return onSystem(msg.text);
          default: console.warn('unknown server msg', msg);
        }
      }

      function onLoggedIn(username, token) {
        // Successful auth — stop any pending reconnect attempts and
        // reset the backoff counter so the next failover starts
        // fresh.
        cancelReconnect();
        state.username = username;
        if (token) sessionStorage.setItem(TOKEN_KEY, token);
        $me.textContent = username;
        $loginErr.textContent = '';
        $login.style.display = 'none';
        $chat.classList.add('active');
      }

      function onLoginFailed(reason) {
        // Stale / expired / revoked token — wipe it so we don't
        // keep retrying with the same dead credentials, and bail
        // back to the login screen so the user can re-auth.
        cancelReconnect();
        sessionStorage.removeItem(TOKEN_KEY);
        if (state.ws) { try { state.ws.close(); } catch {} }
        state.ws = null;
        if (state.username) resetToLogin();
        $loginErr.textContent = reason || 'Login failed.';
      }

      function onRooms(rooms) {
        // Preserve DM "rooms" — they're per-session client state, not
        // part of the cluster-wide directory.  Without this, every
        // `RoomsChanged` broadcast would wipe open DMs.
        const dms = state.rooms.filter(isDmRoom);
        state.rooms = [...rooms, ...dms];
        for (const r of state.rooms) {
          if (!state.messagesByRoom.has(r)) state.messagesByRoom.set(r, []);
          if (!state.usersByRoom.has(r))    state.usersByRoom.set(r, []);
          if (!state.unreadByRoom.has(r))   state.unreadByRoom.set(r, 0);
        }
        if (!state.currentRoom) state.currentRoom = rooms[0] ?? null;
        renderRoomList();
        renderMessages();
        renderUsers();
      }

      /** Open a DM with another user — client-side only.  No protocol
       *  frame yet; `join` fires when the user actually selects it,
       *  which mirrors the lazy-history flow for default rooms. */
      function openDm(otherUser) {
        if (!otherUser || otherUser === state.username) return;
        const room = dmRoomFor(otherUser);
        if (!state.rooms.includes(room)) {
          state.rooms = [...state.rooms, room];
          state.messagesByRoom.set(room, []);
          state.usersByRoom.set(room, []);
          state.unreadByRoom.set(room, 0);
        }
        selectRoom(room);
      }

      function onRoomAdded(name) {
        // Idempotent: `rooms` already carries the full set, so this
        // event is purely for "a new room appeared" toasts/UX.  We
        // still show a system line so the user notices.
        if (!state.rooms.includes(name)) {
          state.rooms.push(name);
          if (!state.messagesByRoom.has(name)) state.messagesByRoom.set(name, []);
          if (!state.usersByRoom.has(name))    state.usersByRoom.set(name, []);
          if (!state.unreadByRoom.has(name))   state.unreadByRoom.set(name, 0);
          renderRoomList();
        }
        onSystem(`New room "#${name}" available — click to join.`);
      }

      function onRoomRemoved(name) {
        state.rooms = state.rooms.filter((r) => r !== name);
        const wasCurrent = state.currentRoom === name;
        state.messagesByRoom.delete(name);
        state.usersByRoom.delete(name);
        state.unreadByRoom.delete(name);
        if (wasCurrent) state.currentRoom = state.rooms[0] ?? null;
        renderRoomList();
        if (wasCurrent) {
          renderMessages();
          renderUsers();
          onSystem(`Room "#${name}" was removed.`);
        }
      }

      function onHistory(room, messages) {
        state.messagesByRoom.set(room, messages.slice());
        if (room === state.currentRoom) renderMessages();
      }

      function onMessage(room, m) {
        const list = state.messagesByRoom.get(room) ?? [];
        list.push(m);
        state.messagesByRoom.set(room, list);
        if (room === state.currentRoom) {
          renderMessages();
        } else {
          state.unreadByRoom.set(room, (state.unreadByRoom.get(room) ?? 0) + 1);
          renderRoomList();
        }
      }

      function onUsers(room, users) {
        state.usersByRoom.set(room, users.slice().sort());
        if (room === state.currentRoom) renderUsers();
      }

      function onSystem(text) {
        const list = state.messagesByRoom.get(state.currentRoom) ?? [];
        list.push({ from: '*', text, ts: Date.now(), system: true });
        state.messagesByRoom.set(state.currentRoom, list);
        renderMessages();
      }

      /* ============== outbound ============== */
      $compose.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = $cText.value.trim();
        if (!text || !state.currentRoom || !state.ws) return;
        state.ws.send(JSON.stringify({ type: 'send', room: state.currentRoom, text }));
        $cText.value = '';
      });

      $rcForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = $rcInput.value.trim();
        if (!ROOM_NAME_PATTERN.test(name)) {
          $rcInput.classList.add('invalid');
          return;
        }
        $rcInput.classList.remove('invalid');
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ type: 'create-room', name }));
        }
        $rcInput.value = '';
      });
      $rcInput.addEventListener('input', () => {
        $rcInput.classList.remove('invalid');
      });

      function selectRoom(room) {
        if (state.currentRoom === room) return;
        // User-created rooms aren't auto-joined at login — explicitly
        // `join` first so we get presence + history.  Idempotent
        // server-side, so doing it for default rooms too is harmless.
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ type: 'join', room }));
        }
        state.currentRoom = room;
        state.unreadByRoom.set(room, 0);
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ type: 'switch-active-room', room }));
        }
        renderRoomList();
        renderMessages();
        renderUsers();
      }

      /* ============== render ============== */
      function renderRoomList() {
        $rooms.innerHTML = '';
        for (const room of state.rooms) {
          const li = document.createElement('li');
          const isDm = isDmRoom(room);
          li.className =
            (room === state.currentRoom ? 'active ' : '') + (isDm ? 'dm' : '');
          const unread = state.unreadByRoom.get(room) ?? 0;
          // DM rooms render as `@user`; channels as `#name`.
          const label = isDm ? room : `# ${room}`;
          li.innerHTML = `<span>${escapeHtml(label)}</span>`;
          if (unread > 0) {
            const span = document.createElement('span');
            span.className = 'badge';
            span.textContent = String(unread);
            li.appendChild(span);
          }
          li.addEventListener('click', () => selectRoom(room));
          $rooms.appendChild(li);
        }
      }

      function renderMessages() {
        $msgs.innerHTML = '';
        const list = state.currentRoom
          ? (state.messagesByRoom.get(state.currentRoom) ?? [])
          : [];
        for (const m of list) {
          const div = document.createElement('div');
          div.className = 'msg' + (m.system ? ' system' : '');
          if (m.system) {
            div.textContent = m.text;
          } else {
            const fromEl = document.createElement('span');
            fromEl.className = 'from';
            fromEl.textContent = m.from + ':';
            div.appendChild(fromEl);
            div.appendChild(document.createTextNode(m.text));
            const tsEl = document.createElement('span');
            tsEl.className = 'ts';
            tsEl.textContent = formatTime(m.ts);
            div.appendChild(tsEl);
          }
          $msgs.appendChild(div);
        }
        $msgs.scrollTop = $msgs.scrollHeight;
      }

      function renderUsers() {
        $users.innerHTML = '';
        // DM "rooms" never get a `users` frame from the server, so
        // we fall back to the inferred pair (self + other).  Looks
        // the same as a 2-user channel — keeps the panel useful in
        // DM views too.
        let users = state.currentRoom
          ? (state.usersByRoom.get(state.currentRoom) ?? [])
          : [];
        if (state.currentRoom && isDmRoom(state.currentRoom) && users.length === 0) {
          users = [state.currentRoom.slice(1), state.username];
        }
        $usersCnt.textContent = String(users.length);
        for (const u of users) {
          const li = document.createElement('li');
          const isSelf = u === state.username;
          li.className = isSelf ? 'self' : '';
          li.title = isSelf ? '' : `Click to message @${u}`;
          li.textContent = u + (isSelf ? ' (you)' : '');
          if (!isSelf) li.addEventListener('click', () => openDm(u));
          $users.appendChild(li);
        }
      }

      function resetToLogin() {
        cancelReconnect();
        state.username = null;
        state.ws = null;
        state.rooms = [];
        state.currentRoom = null;
        state.messagesByRoom.clear();
        state.usersByRoom.clear();
        state.unreadByRoom.clear();
        $chat.classList.remove('active');
        $login.hidden = false;
        $login.style.display = '';
        $username.value = '';
        $password.value = '';
      }

      /* ============== utils ============== */
      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[c]));
      }
      function formatTime(ts) {
        const d = new Date(ts);
        return d.toLocaleTimeString();
      }

      /* ============== auto-resume on load ============== */
      // Synchronous decision before paint: if there's a token in
      // sessionStorage (reload of a logged-in tab, or transient
      // failover-reconnect) skip the login form entirely and go
      // straight to a `resume` handshake.  The login section is
      // already hidden via its `hidden` attribute, and the chat
      // section is hidden until `chat.active` lands — so the user
      // sees an empty page for the ~100 ms it takes for the WS
      // round trip, then drops into the chat view.  Without a
      // token: reveal the login form.
      const storedToken = sessionStorage.getItem(TOKEN_KEY);
      if (storedToken) {
        connectWithResume(storedToken);
      } else {
        $login.hidden = false;
      }
    </script>
  </body>
</html>
