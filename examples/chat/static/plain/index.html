<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>actor-ts chat — plain HTML</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: color-mix(in srgb, currentColor 15%, transparent);
        --soft:   color-mix(in srgb, currentColor 5%, transparent);
        --accent: #4f8cff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        line-height: 1.4;
      }

      /* ---------- login screen ---------- */
      #login {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      #login h1 { margin-bottom: 0.25rem; }
      #login .lead { color: #888; margin-top: 0; }
      form#login-form {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: 280px;
        margin-top: 1rem;
      }
      form#login-form input,
      form#login-form button {
        padding: 0.5rem 0.75rem;
        font: inherit;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      form#login-form button {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
        cursor: pointer;
      }
      #login-error {
        color: crimson;
        font-size: 0.9rem;
        min-height: 1.2em;
        margin-top: 0.5rem;
      }
      .creds {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        background: var(--soft);
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        max-width: 320px;
      }
      .creds code {
        background: var(--border);
        padding: 0 0.25rem;
        border-radius: 3px;
      }

      /* ---------- chat screen ---------- */
      #chat {
        display: none;
        height: 100vh;
        flex-direction: column;
      }
      #chat.active { display: flex; }
      header.bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 1rem;
        border-bottom: 1px solid var(--border);
      }
      header.bar .title { font-weight: 600; }
      header.bar button {
        font: inherit;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
      }
      .layout {
        flex: 1;
        display: grid;
        grid-template-columns: 220px 1fr 220px;
        min-height: 0;
      }
      .layout > aside,
      .layout > main {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      aside { border-right: 1px solid var(--border); }
      aside:last-child { border-right: none; border-left: 1px solid var(--border); }
      aside h2 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        margin: 0;
        padding: 0.75rem 1rem;
      }
      ul.list {
        list-style: none;
        margin: 0;
        padding: 0 0 0.5rem 0;
        overflow-y: auto;
        flex: 1;
      }
      ul.list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.4rem 1rem;
        cursor: pointer;
        border-left: 3px solid transparent;
      }
      ul.list li.active {
        background: var(--soft);
        border-left-color: var(--accent);
        font-weight: 600;
      }
      ul.list li .badge {
        background: var(--accent);
        color: white;
        font-size: 0.7rem;
        padding: 0.05rem 0.4rem;
        border-radius: 999px;
      }
      ul.list.users li {
        cursor: default;
        border-left: none;
      }

      main {
        position: relative;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem 1rem;
      }
      .messages .msg { margin-bottom: 0.4rem; }
      .messages .msg .from {
        font-weight: 600;
        margin-right: 0.4rem;
      }
      .messages .msg .ts {
        color: #888;
        font-size: 0.75rem;
        margin-left: 0.5rem;
      }
      .messages .msg.system {
        color: #888;
        font-style: italic;
      }
      form.compose {
        display: flex;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-top: 1px solid var(--border);
      }
      form.compose input {
        flex: 1;
        font: inherit;
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      form.compose button {
        font: inherit;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- ============== LOGIN ============== -->
    <section id="login">
      <h1>actor-ts chat</h1>
      <p class="lead">Plain HTML frontend</p>
      <form id="login-form" autocomplete="off">
        <input id="username" name="username" placeholder="username" required />
        <input id="password" name="password" type="password" placeholder="password" required />
        <button type="submit">Log in</button>
        <div id="login-error"></div>
      </form>
      <div class="creds">
        <strong>Test users</strong>:
        <code>alice</code>/<code>wonderland</code>,
        <code>bob</code>/<code>builder</code>,
        <code>charlie</code>/<code>chaplin</code>,
        <code>diana</code>/<code>prince</code>
      </div>
    </section>

    <!-- ============== CHAT ============== -->
    <section id="chat">
      <header class="bar">
        <div class="title">actor-ts chat — <span id="me"></span></div>
        <button id="logout">Logout</button>
      </header>
      <div class="layout">
        <aside>
          <h2>Rooms</h2>
          <ul id="rooms" class="list"></ul>
        </aside>
        <main>
          <div id="messages" class="messages"></div>
          <form id="compose" class="compose">
            <input id="compose-text" placeholder="Type a message…" autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </main>
        <aside>
          <h2>Online (<span id="users-count">0</span>)</h2>
          <ul id="users" class="list users"></ul>
        </aside>
      </div>
    </section>

    <script>
      'use strict';

      /* ============== state ============== */
      const TOKEN_KEY = 'chat-token';
      const state = {
        username: null,
        ws: null,
        rooms: [],
        currentRoom: null,
        messagesByRoom: new Map(),    // RoomName → ChatMessage[]
        usersByRoom:    new Map(),    // RoomName → string[]
        unreadByRoom:   new Map(),    // RoomName → number
      };

      /* ============== elements ============== */
      const $login    = document.getElementById('login');
      const $chat     = document.getElementById('chat');
      const $me       = document.getElementById('me');
      const $form     = document.getElementById('login-form');
      const $username = document.getElementById('username');
      const $password = document.getElementById('password');
      const $loginErr = document.getElementById('login-error');
      const $logout   = document.getElementById('logout');
      const $rooms    = document.getElementById('rooms');
      const $users    = document.getElementById('users');
      const $usersCnt = document.getElementById('users-count');
      const $msgs     = document.getElementById('messages');
      const $compose  = document.getElementById('compose');
      const $cText    = document.getElementById('compose-text');

      /* ============== login ============== */
      $form.addEventListener('submit', (e) => {
        e.preventDefault();
        $loginErr.textContent = '';
        const username = $username.value.trim();
        const password = $password.value;
        if (!username || !password) return;
        connectWithLogin(username, password);
      });
      $logout.addEventListener('click', () => {
        // Tell the server to revoke our token before the WS closes,
        // then wipe local state.  Server will stop our session actor
        // which closes the socket — `close` handler resets the UI.
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          try { state.ws.send(JSON.stringify({ type: 'logout' })); } catch {}
        }
        localStorage.removeItem(TOKEN_KEY);
        if (state.ws) { try { state.ws.close(1000, 'logout'); } catch {} }
        resetToLogin();
      });

      /* ============== websocket ============== */
      function wsUrl() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${proto}//${location.host}/ws`;
      }

      // Two entry points — login (with credentials) and resume (with
      // a stored token).  Both end up doing the same thing once the
      // server replies with `logged-in`; only the first frame they
      // send differs.

      function connectWithLogin(username, password) {
        connect((ws) => ws.send(JSON.stringify({ type: 'login', username, password })));
      }

      function connectWithResume(token) {
        connect((ws) => ws.send(JSON.stringify({ type: 'resume', token })));
      }

      function connect(onOpen) {
        const ws = new WebSocket(wsUrl());
        state.ws = ws;
        ws.addEventListener('open', () => onOpen(ws));
        ws.addEventListener('message', (ev) => {
          let msg;
          try { msg = JSON.parse(ev.data); } catch { return; }
          handleServer(msg);
        });
        ws.addEventListener('close', () => {
          if (state.username) {
            // disconnect after login → drop back to login screen
            resetToLogin();
            $loginErr.textContent = 'Connection closed.';
          }
        });
        ws.addEventListener('error', () => {
          if (!state.username) {
            $loginErr.textContent = 'Connection failed.';
          }
        });
      }

      /* ============== inbound dispatch ============== */
      function handleServer(msg) {
        switch (msg.type) {
          case 'logged-in':    return onLoggedIn(msg.username, msg.token);
          case 'login-failed': return onLoginFailed(msg.reason);
          case 'rooms':        return onRooms(msg.rooms);
          case 'history':      return onHistory(msg.room, msg.messages);
          case 'message':      return onMessage(msg.room, { from: msg.from, text: msg.text, ts: msg.ts });
          case 'users':        return onUsers(msg.room, msg.users);
          case 'system':       return onSystem(msg.text);
          default: console.warn('unknown server msg', msg);
        }
      }

      function onLoggedIn(username, token) {
        state.username = username;
        if (token) localStorage.setItem(TOKEN_KEY, token);
        $me.textContent = username;
        $login.style.display = 'none';
        $chat.classList.add('active');
      }

      function onLoginFailed(reason) {
        $loginErr.textContent = reason || 'Login failed.';
        // Stale / expired token → wipe it so the next page-load
        // doesn't keep retrying with the same dead credentials.
        localStorage.removeItem(TOKEN_KEY);
        if (state.ws) { try { state.ws.close(); } catch {} }
        state.ws = null;
      }

      function onRooms(rooms) {
        state.rooms = rooms.slice();
        for (const r of rooms) {
          if (!state.messagesByRoom.has(r)) state.messagesByRoom.set(r, []);
          if (!state.usersByRoom.has(r))    state.usersByRoom.set(r, []);
          if (!state.unreadByRoom.has(r))   state.unreadByRoom.set(r, 0);
        }
        if (!state.currentRoom) state.currentRoom = rooms[0] ?? null;
        renderRoomList();
        renderMessages();
        renderUsers();
      }

      function onHistory(room, messages) {
        state.messagesByRoom.set(room, messages.slice());
        if (room === state.currentRoom) renderMessages();
      }

      function onMessage(room, m) {
        const list = state.messagesByRoom.get(room) ?? [];
        list.push(m);
        state.messagesByRoom.set(room, list);
        if (room === state.currentRoom) {
          renderMessages();
        } else {
          state.unreadByRoom.set(room, (state.unreadByRoom.get(room) ?? 0) + 1);
          renderRoomList();
        }
      }

      function onUsers(room, users) {
        state.usersByRoom.set(room, users.slice().sort());
        if (room === state.currentRoom) renderUsers();
      }

      function onSystem(text) {
        const list = state.messagesByRoom.get(state.currentRoom) ?? [];
        list.push({ from: '*', text, ts: Date.now(), system: true });
        state.messagesByRoom.set(state.currentRoom, list);
        renderMessages();
      }

      /* ============== outbound ============== */
      $compose.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = $cText.value.trim();
        if (!text || !state.currentRoom || !state.ws) return;
        state.ws.send(JSON.stringify({ type: 'send', room: state.currentRoom, text }));
        $cText.value = '';
      });

      function selectRoom(room) {
        if (state.currentRoom === room) return;
        state.currentRoom = room;
        state.unreadByRoom.set(room, 0);
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ type: 'switch-active-room', room }));
        }
        renderRoomList();
        renderMessages();
        renderUsers();
      }

      /* ============== render ============== */
      function renderRoomList() {
        $rooms.innerHTML = '';
        for (const room of state.rooms) {
          const li = document.createElement('li');
          li.className = room === state.currentRoom ? 'active' : '';
          const unread = state.unreadByRoom.get(room) ?? 0;
          li.innerHTML = `<span># ${escapeHtml(room)}</span>`;
          if (unread > 0) {
            const span = document.createElement('span');
            span.className = 'badge';
            span.textContent = String(unread);
            li.appendChild(span);
          }
          li.addEventListener('click', () => selectRoom(room));
          $rooms.appendChild(li);
        }
      }

      function renderMessages() {
        $msgs.innerHTML = '';
        const list = state.currentRoom
          ? (state.messagesByRoom.get(state.currentRoom) ?? [])
          : [];
        for (const m of list) {
          const div = document.createElement('div');
          div.className = 'msg' + (m.system ? ' system' : '');
          if (m.system) {
            div.textContent = m.text;
          } else {
            const fromEl = document.createElement('span');
            fromEl.className = 'from';
            fromEl.textContent = m.from + ':';
            div.appendChild(fromEl);
            div.appendChild(document.createTextNode(m.text));
            const tsEl = document.createElement('span');
            tsEl.className = 'ts';
            tsEl.textContent = formatTime(m.ts);
            div.appendChild(tsEl);
          }
          $msgs.appendChild(div);
        }
        $msgs.scrollTop = $msgs.scrollHeight;
      }

      function renderUsers() {
        $users.innerHTML = '';
        const users = state.currentRoom
          ? (state.usersByRoom.get(state.currentRoom) ?? [])
          : [];
        $usersCnt.textContent = String(users.length);
        for (const u of users) {
          const li = document.createElement('li');
          li.textContent = u + (u === state.username ? ' (you)' : '');
          $users.appendChild(li);
        }
      }

      function resetToLogin() {
        state.username = null;
        state.ws = null;
        state.rooms = [];
        state.currentRoom = null;
        state.messagesByRoom.clear();
        state.usersByRoom.clear();
        state.unreadByRoom.clear();
        $chat.classList.remove('active');
        $login.style.display = '';
        $username.value = '';
        $password.value = '';
      }

      /* ============== utils ============== */
      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[c]));
      }
      function formatTime(ts) {
        const d = new Date(ts);
        return d.toLocaleTimeString();
      }

      /* ============== auto-resume on load ============== */
      // If the previous session left us a token in localStorage (page
      // reload, browser restart, or singleton-failover) skip straight
      // to a `resume` handshake.  Server replies with `logged-in`
      // → onLoggedIn flips us into chat view.  If the token is stale,
      // server replies with `login-failed` → onLoginFailed clears it
      // and the user falls back to the credentials form.
      const storedToken = localStorage.getItem(TOKEN_KEY);
      if (storedToken) connectWithResume(storedToken);
    </script>
  </body>
</html>
