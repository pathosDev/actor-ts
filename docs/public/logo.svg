<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-label="actor-ts">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- mesh of interconnected "actors" -->
  <g transform="translate(30, 34)" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round">
    <line x1="36"  y1="32"  x2="78"  y2="14"/>
    <line x1="36"  y1="32"  x2="14"  y2="78"/>
    <line x1="36"  y1="32"  x2="84"  y2="80"/>
    <line x1="78"  y1="14"  x2="108" y2="50"/>
    <line x1="84"  y1="80"  x2="108" y2="50"/>
    <line x1="14"  y1="78"  x2="84"  y2="80"/>
    <line x1="14"  y1="78"  x2="40"  y2="112"/>
    <line x1="40"  y1="112" x2="84"  y2="80"/>
    <line x1="40"  y1="112" x2="92"  y2="108"/>
    <line x1="92"  y1="108" x2="108" y2="50"/>
  </g>

  <g transform="translate(30, 34)" fill="url(#grad)" stroke="#1e293b" stroke-width="1.5">
    <circle cx="36"  cy="32"  r="10"/>
    <circle cx="78"  cy="14"  r="8"/>
    <circle cx="14"  cy="78"  r="9"/>
    <circle cx="108" cy="50"  r="11"/>
    <circle cx="84"  cy="80"  r="9"/>
    <circle cx="40"  cy="112" r="8"/>
    <circle cx="92"  cy="108" r="7"/>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-weight="700">
    <text x="180" y="98" font-size="72" fill="#0f172a" letter-spacing="-2">
      actor<tspan fill="#ef4444">-</tspan><tspan fill="#6366f1">ts</tspan>
    </text>
    <text x="184" y="132" font-size="16" fill="#475569" letter-spacing="2">
      the actor model · on Bun, Node &amp; Deno
    </text>
  </g>
</svg>
