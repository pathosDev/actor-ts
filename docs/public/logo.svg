<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 514.47 119.03" role="img" aria-label="actor-ts">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <style>
      /* Tagline picks up the host color-scheme — slate-400 on dark
         backgrounds, slate-500 on light backgrounds. */
      .tagline { fill: #94a3b8; }
      @media (prefers-color-scheme: light) {
        .tagline { fill: #64748b; }
      }
    </style>
  </defs>

  <!-- mesh of interconnected "actors" — left side, 0..118 × 0..118 -->
  <g fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round">
    <line x1="33" y1="28" x2="75" y2="10"/>
    <line x1="33" y1="28" x2="11" y2="74"/>
    <line x1="33" y1="28" x2="81" y2="76"/>
    <line x1="75" y1="10" x2="105" y2="46"/>
    <line x1="81" y1="76" x2="105" y2="46"/>
    <line x1="11" y1="74" x2="81" y2="76"/>
    <line x1="11" y1="74" x2="37" y2="108"/>
    <line x1="37" y1="108" x2="81" y2="76"/>
    <line x1="37" y1="108" x2="89" y2="104"/>
    <line x1="89" y1="104" x2="105" y2="46"/>
  </g>

  <g fill="url(#grad)" stroke="#1e293b" stroke-width="1.5">
    <circle cx="33"  cy="28"  r="10"/>
    <circle cx="75"  cy="10"  r="8"/>
    <circle cx="11"  cy="74"  r="9"/>
    <circle cx="105" cy="46"  r="11"/>
    <circle cx="81"  cy="76"  r="9"/>
    <circle cx="37"  cy="108" r="8"/>
    <circle cx="89"  cy="104" r="7"/>
  </g>

  <!-- wordmark + tagline: positioned so the wordmark+tagline BLOCK is
       vertically centered in the viewBox, matching the mesh's vertical
       center on its left.  Wordmark baseline y=72, tagline baseline
       y=98 — block visual center lands at viewBox center y≈59.5. -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-weight="700">
    <text x="130" y="72" font-size="64" fill="#6366f1" letter-spacing="-1">
      actor<tspan fill="#ef4444">-</tspan><tspan fill="#6366f1">ts</tspan>
    </text>
    <text x="132" y="98" font-size="14" class="tagline" letter-spacing="1.5">
      the actor model · on Bun, Node &amp; Deno
    </text>
  </g>
</svg>
