# Mosquitto config for the live-integration suite.
#
# `allow_anonymous true` is the only non-default — without it
# Mosquitto 2.0+ rejects unauthenticated connections, which would
# require us to wire up a `passwd` file just to run the test
# scenarios.  Anonymous is fine because the broker only sees
# traffic from the runner container on the compose bridge.
listener 1883
allow_anonymous true
