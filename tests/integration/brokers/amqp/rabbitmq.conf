# RabbitMQ config for the live-integration suite.
#
# `deprecated_features.permit.transient_nonexcl_queues = true` —
# the integration scenarios declare `{ durable: false, autoDelete:
# true }` queues (test setup; queues vanish on disconnect).
# RabbitMQ 4.x marks the transient+non-exclusive queue shape as
# deprecated and rejects it by default; we explicitly opt back
# in so the tests keep using the natural ephemeral-queue pattern.
# Production users who actually shipped durable queues are
# unaffected — that's the more common production shape anyway.
deprecated_features.permit.transient_nonexcl_queues = true
