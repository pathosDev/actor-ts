# NATS live-integration suite (B.6 / #24).
#
# NATS boots in well under a second — the fastest broker in the
# suite.  No auth, no clustering — just the standalone server on
# port 4222.
#
# Run locally:
#   bun run test:integration:nats
#   bun run test:integration:nats:teardown

name: actor-ts-integration-nats

services:
  nats:
    # `latest` deliberately — integration tests want to surface
    # upstream NATS regressions as soon as they ship.  Production
    # users pin a specific version themselves.
    image: nats:latest
    # `-p 4222` for client traffic.  No healthcheck here: the
    # NATS image is built on `scratch` and ships no shell / curl /
    # wget / nc, so docker-compose has no way to probe readiness
    # from inside the container.  Instead the runner's own
    # `waitForPort` (lib/wait-for-port.ts) polls the client port
    # until it accepts a TCP connection — same readiness shape,
    # just from the OUTSIDE.
    command: ["-p", "4222"]
    networks:
      natsnet: {}

  runner:
    build:
      context: ../../../..
      dockerfile: tests/integration/brokers/nats/Dockerfile.runner
    depends_on:
      nats:
        # `service_started` because the scratch image has no
        # readiness probe — see the comment on the nats service
        # above.  The runner's `waitForPort` is the actual gate.
        condition: service_started
    environment:
      NATS_SERVERS: nats://nats:4222
    networks:
      natsnet: {}

networks:
  natsnet: {}
